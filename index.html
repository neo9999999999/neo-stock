async function lsGet(key) {
  try { const v=localStorage.getItem(key); return v?{value:v}:null; } catch{return null;}
}
async function lsSet(key,val) {
  try{localStorage.setItem(key,val);return true;}catch{return null;}
}
async function lsDel(key) {
  try{localStorage.removeItem(key);return true;}catch{return null;}
}

// ─── 히스토리 (localStorage) ───
async function loadHistoryList(){
  try{const r=await lsGet(HISTORY_INDEX_KEY);return r?JSON.parse(r.value):[];}catch{return[];}
}
async function saveToHistory(data){
  const id="neo-item-"+Date.now();
  const meta={id,name:data.name,code:data.code,market:data.market,date:data.date||new Date().toLocaleDateString("ko-KR"),cp:data.cp,cr:data.cr,trend:data.trend,ou:data.ou,score:(data.scan18||[]).reduce((a,b)=>a+(b.pt||0),0),savedAt:Date.now()};
  await lsSet(id,JSON.stringify(data));
  const list=await loadHistoryList();
  const deduped=list.filter(m=>!(m.code===meta.code&&m.date===meta.date));
  const updated=[meta,...deduped].slice(0,100);
  await lsSet(HISTORY_INDEX_KEY,JSON.stringify(updated));
  return updated;
}
async function loadHistoryItem(id){
  try{const r=await lsGet(id);return r?JSON.parse(r.value):null;}catch{return null;}
}
async function deleteHistoryItem(id){
  try{await lsDel(id);const list=await loadHistoryList();const updated=list.filter(m=>m.id!==id);await lsSet(HISTORY_INDEX_KEY,JSON.stringify(updated));return updated;}catch{return[];}
}

// ─── 유틸 ───
function parseJSON(text){
  const s=text.indexOf("{"),e=text.lastIndexOf("}");
  if(s===-1||e<=s)return null;
  const sl=text.slice(s,e+1);
  try{return JSON.parse(sl);}catch{}
  try{return JSON.parse(sl.replace(/[\x00-\x1F\x7F]/g," "));}catch{}
  return null;
}
function resizeImage(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1400,ratio=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",0.85));
    };
    img.src=dataUrl;
  });
}

function HistoryScreen({onSelect}){

    <div style={{fontFamily:"'Apple SD Gothic Neo',sans-serif",background:"#F0F2F5",minHeight:"100vh",paddingBottom:80}}>

        </div>
        <div style={{fontSize:11,color:"#555",marginTop:3}}>분석 완료 시 자동 저장 · 브라우저에 영구 보관</div>

      <div style={{padding:"14px",maxWidth:720,margin:"0 auto"}}>
        {list===null&&<div style={{textAlign:"center",padding:"60px 0",color:"#aaa"}}>불러오는 중...</div>}
        {list!==null&&list.length===0&&<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>📂</div><div style={{fontSize:16,fontWeight:700,color:"#444",marginBottom:8}}>저장된 분석이 없습니다</div><div style={{fontSize:13,color:"#aaa"}}>차트를 분석하면 자동으로 저장됩니다</div></div>}
        {Object.entries(grouped).map(([date,items])=>(
          <div key={date} style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#888",padding:"8px 4px 6px",display:"flex",alignItems:"center",gap:8}}><div style={{height:1,flex:1,background:"#E8E8E8"}}/> 📅 {date} <div style={{height:1,flex:1,background:"#E8E8E8"}}/></div>
            {items.map(meta=>{
              const v=getV(meta.ou,meta.score),isUp=(meta.cr||0)>=0;
              return <div key={meta.id} onClick={()=>onSelect(meta.id)} style={{background:"#fff",borderRadius:20,padding:"16px",marginBottom:8,cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.04)",border:"1.5px solid #EBEBEB",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#5B8DEF"} onMouseLeave={e=>e.currentTarget.style.borderColor="#EBEBEB"}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div><div style={{fontSize:17,fontWeight:800,marginBottom:3}}>{meta.name}</div><div style={{fontSize:11,color:"#aaa"}}>{meta.code} · {meta.market}</div></div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                    <span style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:14,background:v.bg,color:v.c}}>{v.label}</span>
                    <button onClick={e=>handleDelete(e,meta.id)} style={{background:"none",border:"none",color:"#ccc",fontSize:15,cursor:"pointer",padding:0}}>{deleting===meta.id?"…":"🗑"}</button>

// ─── 메인 앱 ───
function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(API_KEY_STORAGE)||"");
  const [showApiInput,setShowApiInput]=useState(false);
  const [tab,setTab]=useState("analyze");
  const [imgs,setImgs]=useState([]);
  const [selIdx,setSelIdx]=useState(0);
  const [loading,setLoading]=useState(false);
  const [pct,setPct]=useState(0);
  const [stepIdx,setStepIdx]=useState(0);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const [drag,setDrag]=useState(false);
  const [isDemo,setIsDemo]=useState(true);
  const [historyCount,setHistoryCount]=useState(0);
  const [historyDetail,setHistoryDetail]=useState(null);
  const fileRef=useRef();
  const timerRef=useRef();
  const d=result||(isDemo?DEMO_DATA:null);

  useEffect(()=>{loadHistoryList().then(l=>setHistoryCount(l.length));},[]);

  if(!apiKey&&!showApiInput) return <ApiKeyScreen onSave={k=>{setApiKey(k);setShowApiInput(false);}}/>;
  if(showApiInput) return <ApiKeyScreen onSave={k=>{setApiKey(k);setShowApiInput(false);}}/>;

  const handleFiles=files=>{
    const arr=Array.from(files).filter(f=>f.type.startsWith("image/"));
    if(!arr.length)return;
    Promise.all(arr.map(f=>new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);}))).then(results=>{
      setImgs(prev=>{const next=[...prev,...results];setSelIdx(prev.length);return next;});
      setIsDemo(false);
    });
  };
  const removeImg=(i,e)=>{e.stopPropagation();setImgs(prev=>{const n=[...prev];n.splice(i,1);setSelIdx(s=>Math.min(s,n.length-1));return n;});setResult(null);if(imgs.length<=1)setIsDemo(true);};
  const startTimer=()=>{let p=0;clearInterval(timerRef.current);timerRef.current=setInterval(()=>{p=Math.min(p+(p<40?2:p<75?1:0.3),95);setPct(Math.floor(p));setStepIdx(Math.min(5,Math.floor(p/17)));},200);};

  const analyze=async()=>{
    if(!imgs.length)return;
    setLoading(true);setError(null);setResult(null);setPct(0);setStepIdx(0);startTimer();
    try{
      const resizedAll=await Promise.all(imgs.map(img=>resizeImage(img)));
      const today=new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"});
      const imageContents=resizedAll.map(r=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:r.split(",")[1]}}));
      const imageDesc=imgs.length>1?`첨부된 ${imgs.length}장의 이미지를 모두 참고하세요.\n\n`:"";
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:"한국 HTS 차트 분석 전문가. 여러 장의 이미지가 주어지면 모두 참고해서 종합 분석. JSON만 출력. 백틱 금지.",messages:[{role:"user",content:[...imageContents,{type:"text",text:imageDesc+buildPrompt(today)}]}]})
      });
      if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||"API 오류 "+res.status);}
      const data=await res.json();
      const text=(data.content||[]).map(c=>c.text||"").join("");
      const parsed=parseJSON(text);
      if(!parsed)throw new Error("파싱 실패. 다시 시도해주세요.");
      clearInterval(timerRef.current);setPct(100);setStepIdx(6);
      const updatedList=await saveToHistory(parsed);
      setHistoryCount(updatedList.length);
      setTimeout(()=>{setResult(parsed);setLoading(false);},400);
    }catch(err){clearInterval(timerRef.current);setError(err.message);setLoading(false);}
  };

  const handleHistorySelect=async id=>{const data=await loadHistoryItem(id);if(data)setHistoryDetail({data});};
  const handleTabChange=t=>{setTab(t);setHistoryDetail(null);};

  if(historyDetail) return(
    <div style={{fontFamily:"'Apple SD Gothic Neo',sans-serif",background:"#F0F2F5",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:"#111",padding:"16px 18px 12px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>setHistoryDetail(null)} style={{background:"#333",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",borderRadius:10,padding:"6px 14px"}}>← 목록</button>
          <b style={{fontSize:15,color:"#fff"}}>{historyDetail.data.name}</b>
          <span style={{fontSize:11,color:"#4CAF82",background:"rgba(76,175,130,0.15)",padding:"3px 10px",borderRadius:20,fontWeight:700}}>📁 저장됨</span>
        </div>
      </div>
      <div style={{padding:"14px",maxWidth:720,margin:"0 auto"}}><AnalysisDetail d={historyDetail.data} isDemo={false} isHistoryView={true}/></div>
      <BottomNav tab={tab} setTab={handleTabChange} historyCount={historyCount} onApiKey={()=>setShowApiInput(true)}/>
    </div>
  );

  if(tab==="guide") return(
    <div style={{fontFamily:"'Apple SD Gothic Neo',sans-serif",background:"#F0F2F5",minHeight:"100vh",paddingBottom:80}}>
      <TradingGuide/>
      <BottomNav tab={tab} setTab={handleTabChange} historyCount={historyCount} onApiKey={()=>setShowApiInput(true)}/>
    </div>
  );

  if(tab==="history") return(
    <div style={{fontFamily:"'Apple SD Gothic Neo',sans-serif",background:"#F0F2F5",minHeight:"100vh"}}>
      <HistoryScreen onSelect={handleHistorySelect}/>
      <BottomNav tab={tab} setTab={handleTabChange} historyCount={historyCount} onApiKey={()=>setShowApiInput(true)}/>
    </div>
  );

  return(
    <div style={{fontFamily:"'Apple SD Gothic Neo',sans-serif",background:"#F0F2F5",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:"#111",padding:"16px 18px 12px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <b style={{fontSize:16,color:"#fff"}}>📊 실전 종목 분석</b>
          {d&&<span style={{fontSize:11,color:"#4CAF82",background:"rgba(76,175,130,0.15)",padding:"3px 10px",borderRadius:20,fontWeight:700}}>{isDemo&&!result?"🔵 데모":"🟢 "+(d.date||"")}</span>}
        </div>
        <div style={{fontSize:11,color:"#555",marginTop:3}}>HTS 차트 → AI 자동 분석 · 분석 시 자동 저장</div>
      </div>
      <div style={{padding:"14px",maxWidth:720,margin:"0 auto"}}>
        {!loading&&(
          <div onClick={()=>fileRef.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}} style={{border:"2px dashed "+(drag?"#5B8DEF":"#DDD"),borderRadius:20,padding:imgs.length?"14px":"36px 20px",textAlign:"center",cursor:"pointer",background:drag?"#F0F5FF":"#fff",marginBottom:12,transition:"all .2s"}}>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
            {imgs.length>0?(
              <><img src={imgs[selIdx]} style={{width:"100%",borderRadius:12,maxHeight:200,objectFit:"cover",marginBottom:10}} alt="차트"/>
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                {imgs.map((im,i)=>(<div key={i} onClick={e=>{e.stopPropagation();setSelIdx(i);setResult(null);}} style={{position:"relative",flexShrink:0,width:64,height:64,borderRadius:10,overflow:"hidden",border:"2.5px solid "+(selIdx===i?"#5B8DEF":"#EBEBEB"),cursor:"pointer"}}><img src={im} style={{width:"100%",height:"100%",objectFit:"cover"}}/><div onClick={e=>removeImg(i,e)} style={{position:"absolute",top:2,right:2,width:18,height:18,borderRadius:"50%",background:"#D43030",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900}}>×</div>{selIdx===i&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"#5B8DEF",color:"#fff",fontSize:9,fontWeight:700,textAlign:"center",padding:"2px 0"}}>선택</div>}</div>))}
                <div style={{flexShrink:0,width:64,height:64,borderRadius:10,border:"2px dashed #DDD",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#bbb"}}>+</div>
              </div>
              <div style={{fontSize:12,color:"#bbb",marginTop:8}}>탭 선택 후 분석 · 클릭하여 추가</div></>
            ):(
              <><div style={{fontSize:40,marginBottom:10}}>📈</div><div style={{fontSize:15,fontWeight:800,marginBottom:6}}>HTS 차트 이미지 업로드</div><div style={{fontSize:13,color:"#999",lineHeight:1.7}}>클릭 또는 드래그&드롭 · 여러 장 가능</div></>
            )}
          </div>
        )}
        {imgs.length>0&&!loading&&(<><button onClick={analyze} style={{width:"100%",background:"#111",color:"#fff",border:"none",borderRadius:16,padding:16,fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:8}}>📊 전체 {imgs.length}장 AI 분석 시작</button><button onClick={()=>{setImgs([]);setSelIdx(0);setResult(null);setError(null);setIsDemo(true);}} style={{width:"100%",background:"#F0F0F0",color:"#666",border:"none",borderRadius:16,padding:12,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:12}}>🗑 전체 초기화</button></>)}
        {loading&&(<Card style={{textAlign:"center",padding:"36px 20px"}}><div style={{fontSize:40,marginBottom:12}}>📊</div><div style={{fontSize:15,fontWeight:800,marginBottom:4}}>AI가 차트를 분석 중...</div><div style={{fontSize:12,color:"#5B8DEF",fontWeight:600,marginBottom:4}}>{STEPS[Math.min(stepIdx,5)]} 중...</div><div style={{fontSize:34,fontWeight:900,marginBottom:14}}>{pct}%</div><div style={{height:8,background:"#F0F0F0",borderRadius:10,overflow:"hidden",marginBottom:16}}><div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#4CAF82,#5B8DEF)",borderRadius:10,transition:"width .2s"}}/></div><div style={{display:"flex",gap:4}}>{STEPS.map((s,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:22,height:22,borderRadius:"50%",background:i<stepIdx?"#4CAF82":"#F0F0F0",color:i<stepIdx?"#fff":"#ccc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>{i<stepIdx?"✓":i+1}</div><div style={{fontSize:8,color:i<stepIdx?"#4CAF82":"#ccc",textAlign:"center"}}>{s}</div></div>))}</div></Card>)}
        {error&&!loading&&(<div style={{background:"#FFF0F0",borderRadius:16,padding:16,marginBottom:12,display:"flex",gap:12}}><span style={{fontSize:22}}>⚠️</span><div><div style={{fontSize:14,fontWeight:700,color:"#D43030",marginBottom:4}}>분석 실패</div><div style={{fontSize:13,color:"#D43030",marginBottom:10}}>{error}</div><button onClick={analyze} style={{background:"#D43030",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>🔄 다시 시도</button></div></div>)}
        {d&&!loading&&<AnalysisDetail d={d} isDemo={isDemo&&!result} isHistoryView={false}/>}
      </div>
      <BottomNav tab={tab} setTab={handleTabChange} historyCount={historyCount} onApiKey={()=>setShowApiInput(true)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
